<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A Girlie Dinner Date — Practical Quiz 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400&family=Cinzel:wght@400&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#1a0515;overflow:hidden;width:100vw;height:100vh;cursor:grab}
    body.drag{cursor:grabbing}
    canvas{position:fixed;top:0;left:0}
    #vignette{position:fixed;inset:0;pointer-events:none;z-index:10;
      background:radial-gradient(ellipse at center,transparent 28%,rgba(20,2,18,.45) 60%,rgba(10,0,12,.88) 100%)}
    #title{position:fixed;top:0;left:0;right:0;z-index:20;padding:1.8rem 2rem .6rem;
      display:flex;flex-direction:column;align-items:center;gap:.25rem;pointer-events:none;
      animation:fd 2s ease .8s both}
    .ey{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.38em;color:#f4a8c8;text-transform:uppercase;opacity:.85}
    h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;
      font-size:clamp(1.4rem,3vw,2.4rem);color:#fde8f0;letter-spacing:.05em}
    .ln{width:72px;height:1px;background:linear-gradient(90deg,transparent,#f4a8c8,transparent)}
    @keyframes fd{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>
<div id="vignette"></div>
<div id="title">
  <span class="ey">A Girlie Evening</span>
  <h1>A Table Set for Love</h1>
  <div class="ln"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.addEventListener('load', function() {

  var renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.NoToneMapping;
  renderer.outputEncoding = THREE.LinearEncoding;
  document.body.appendChild(renderer.domElement);

  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x120010);
  scene.fog = new THREE.Fog(0x120010, 11, 22);

  var camera = new THREE.PerspectiveCamera(44, window.innerWidth/window.innerHeight, 0.1, 60);
  var oTheta=0, oPhi=52, oR=8.5;
  var oTarget = new THREE.Vector3(0, 0.9, 0);
  function camUpdate(){
    var ph=oTheta*Math.PI/180, th=oPhi*Math.PI/180;
    camera.position.set(
      oTarget.x + oR*Math.sin(th)*Math.sin(ph),
      oTarget.y + oR*Math.cos(th),
      oTarget.z + oR*Math.sin(th)*Math.cos(ph)
    );
    camera.lookAt(oTarget);
  }
  camUpdate();

  var PI=Math.PI;
  function mm(col,rough,metal){ return new THREE.MeshStandardMaterial({color:col,roughness:rough||0.65,metalness:metal||0}); }
  function bx(w,h,d,m){ var o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m); o.castShadow=o.receiveShadow=true; return o; }
  function cy(rt,rb,h,s,m){ var o=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s),m); o.castShadow=o.receiveShadow=true; return o; }
  function sp(r,s,m){ var o=new THREE.Mesh(new THREE.SphereGeometry(r,s,s),m); o.castShadow=o.receiveShadow=true; return o; }
  function put(parent,child,x,y,z){ child.position.set(x,y,z); parent.add(child); return child; }

  var mFloor   = mm(0x2a0e22,0.92);
  var mStep    = mm(0x3d1535,0.80);
  var mStepEdge= mm(0xc8689a,0.40,0.30);
  var mWall    = mm(0x1e0820,0.96);
  var mRug     = mm(0x8b1a5a,0.88);
  var mTable   = mm(0x6b2248,0.50,0.05);
  var mCloth   = mm(0x6a1a38,0.82);
  var mChair   = mm(0x8a2258,0.60,0.04);
  var mCushion = mm(0xf48ab0,0.72);
  var mMetal   = mm(0xe8c0d8,0.18,0.90);
  var mGold    = mm(0xe0a8c0,0.15,0.92);
  var mMilo    = mm(0x4a1830,0.58,0.08);
  var mMiloL   = mm(0x2a7040,0.65);
  var mMilk    = mm(0xf8f0e8,0.42,0.15);
  var mMilkL   = mm(0xfdf5f0,0.72);
  var mBlue    = mm(0x6090d0,0.62);
  var mCup     = mm(0xfde8f0,0.38,0.15);
  var mPlate   = mm(0xfdf0f5,0.35,0.25);
  var mWax     = mm(0xffe8f0,0.88);
  var mFlame   = new THREE.MeshStandardMaterial({color:0xff88bb,emissive:new THREE.Color(0xff44aa),emissiveIntensity:2.5,roughness:0.3,transparent:true,opacity:0.92});
  var mRose    = mm(0xff6090,0.72);
  var mRose2   = mm(0xff90b8,0.72);
  var mStem    = mm(0x2a5018,0.82);
  var mCurtain = new THREE.MeshStandardMaterial({color:0x5a0a40,roughness:0.92,side:THREE.DoubleSide});
  var mNapkin  = mm(0xfce8f2,0.88);
  var mPetal   = mm(0xffb8d0,0.80);
  var mBalloon = mm(0xff6aaa,0.70);
  var mBalloon2= mm(0xff9ecc,0.70);
  var mBalloon3= mm(0xe060a0,0.70);
  var mString  = mm(0xddaabb,0.80);
  var mArch    = mm(0x6b1048,0.70);

  // Floor & Rug
  put(scene,bx(30,0.12,30,mFloor),0,-0.06,0);
  put(scene,bx(3.8,0.020,3.8,mm(0xc0508a,0.85)),0,0.010,0);
  put(scene,bx(3.6,0.025,3.6,mRug),0,0.012,0);

  // Walls & ceiling
  put(scene,bx(20,12,0.2,mWall),0,6,-6);
  put(scene,bx(0.2,12,15,mWall),-8,6,0);
  put(scene,bx(0.2,12,15,mWall),8,6,0);
  put(scene,bx(20,0.2,15,mm(0x180618,0.98)),0,11.5,0);
  put(scene,bx(18,1.2,0.15,mm(0x3a0a30,0.90)),0,0.6,-5.88);
  put(scene,bx(16,0.08,0.15,mm(0xc8689a,0.40,0.30)),0,1.26,-5.88);

  // Curtains
  [-3.6,3.6].forEach(function(x){
    var c=new THREE.Mesh(new THREE.PlaneGeometry(1.6,7),mCurtain);
    c.position.set(x,4,-5.88); scene.add(c);
    var tie=cy(0.06,0.06,0.12,10,mm(0xe8b0d0,0.30,0.70));
    tie.rotation.z=PI/2; tie.position.set(x,2.4,-5.82); scene.add(tie);
  });

  // Fairy lights
  var fpts=[];
  for(var i=0;i<=60;i++){ var t=i/60; fpts.push(new THREE.Vector3(-7+t*14,3.8+Math.sin(t*PI*3)*0.25,-5.6)); }
  var fcurve=new THREE.CatmullRomCurve3(fpts);
  scene.add(new THREE.Mesh(new THREE.TubeGeometry(fcurve,120,0.003,4,false),mm(0x6a2040,0.9)));
  var pinkBulbM=new THREE.MeshStandardMaterial({color:0xff88cc,emissive:new THREE.Color(0xff44aa),emissiveIntensity:2.2});
  for(var i=0;i<28;i++){ var b=new THREE.Mesh(new THREE.SphereGeometry(0.025,6,6),pinkBulbM); b.position.copy(fcurve.getPoint(i/27)); scene.add(b); }
  [-7.7,7.7].forEach(function(wx){
    var spts=[]; for(var i=0;i<=30;i++){ var t=i/30; spts.push(new THREE.Vector3(wx,3.5+Math.sin(t*PI*2)*0.18,-5+t*9)); }
    var sc=new THREE.CatmullRomCurve3(spts);
    scene.add(new THREE.Mesh(new THREE.TubeGeometry(sc,60,0.003,4,false),mm(0x6a2040,0.9)));
    for(var i=0;i<14;i++){ var b2=new THREE.Mesh(new THREE.SphereGeometry(0.022,6,6),pinkBulbM); b2.position.copy(sc.getPoint(i/13)); scene.add(b2); }
  });

  // Arch
  put(scene,cy(0.18,0.18,4.5,12,mArch),-1.4,2.25,4.8);
  put(scene,cy(0.18,0.18,4.5,12,mArch),1.4,2.25,4.8);
  var archTop=new THREE.Mesh(new THREE.TorusGeometry(1.4,0.18,12,24,PI),mArch);
  archTop.rotation.z=-PI/2; archTop.position.set(0,4.5,4.8); scene.add(archTop);
  var archTrim=new THREE.Mesh(new THREE.TorusGeometry(1.4,0.06,8,24,PI),mm(0xe8b0d0,0.20,0.85));
  archTrim.rotation.z=-PI/2; archTrim.position.set(0,4.52,4.75); scene.add(archTrim);
  [-1.4,0,1.4].forEach(function(ax){
    for(var fi=0;fi<4;fi++){
      var fp=sp(0.12+Math.random()*0.06,7,fi%2===0?mRose:mRose2);
      fp.position.set(ax+(Math.random()-0.5)*0.3,4.5+(Math.random()-0.5)*0.4,4.72);
      scene.add(fp);
    }
  });

  // Steps
  var s1=bx(5.0,0.18,1.2,mStep); s1.position.set(0,0.09,3.8); scene.add(s1);
  put(scene,bx(5.0,0.04,1.2,mStepEdge),0,0.20,3.8);
  var s2=bx(4.8,0.36,1.2,mStep); s2.position.set(0,0.18,2.5); scene.add(s2);
  put(scene,bx(4.8,0.04,1.2,mStepEdge),0,0.38,2.5);
  var s3=bx(4.6,0.54,1.2,mStep); s3.position.set(0,0.27,1.2); scene.add(s3);
  put(scene,bx(4.6,0.04,1.2,mStepEdge),0,0.56,1.2);
  [-2.3,2.3].forEach(function(rx){
    [3.8,2.5,1.2].forEach(function(rz,ri){
      var post=cy(0.04,0.04,0.9,8,mm(0xe8b0d0,0.20,0.80));
      post.position.set(rx,0.18*(ri+1)+0.45,rz); scene.add(post);
    });
    var railPts=[new THREE.Vector3(rx,0.92,4.2),new THREE.Vector3(rx,0.80,3.8),new THREE.Vector3(rx,0.72,2.5),new THREE.Vector3(rx,0.60,1.2),new THREE.Vector3(rx,0.56,0.4)];
    scene.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(railPts),20,0.025,8,false),mm(0xe8b0d0,0.20,0.80)));
  });
  [[0.3,3.9],[-.5,3.7],[0.8,2.6],[-.3,2.4],[0.1,1.3],[-.7,1.1],[0.5,1.0]].forEach(function(p){
    var pet=bx(0.12,0.01,0.08,mPetal); pet.position.set(p[0],0.22,p[1]); pet.rotation.y=Math.random()*PI; scene.add(pet);
  });

  // Table
  var TG=new THREE.Group(); scene.add(TG);
  var tc=bx(2.35,0.04,2.35,mCloth); tc.position.y=0.92; TG.add(tc);
  var tt=bx(2.12,0.09,2.12,mTable); tt.position.y=0.89; TG.add(tt);
  for(var i=0;i<4;i++){ var a=bx(1.80,0.07,0.06,mTable); a.position.set(Math.sin(i*PI/2)*0.98,0.78,Math.cos(i*PI/2)*0.98); a.rotation.y=i*PI/2; TG.add(a); }
  [[-0.88,-0.88],[0.88,-0.88],[-0.88,0.88],[0.88,0.88]].forEach(function(p){ var leg=cy(0.046,0.052,0.88,8,mTable); leg.position.set(p[0],0.44,p[1]); TG.add(leg); });

  // Chairs
  function makeChair(z,ry){
    var g=new THREE.Group();
    put(g,bx(0.72,0.07,0.67,mChair),0,0.50,0);
    put(g,bx(0.65,0.08,0.60,mCushion),0,0.58,0);
    [-0.28,0.28].forEach(function(x){ put(g,cy(0.030,0.034,1.12,8,mChair),x,0.56,-0.29); });
    [-0.28,0.28].forEach(function(x){ put(g,cy(0.030,0.034,0.52,8,mChair),x,0.26,0.27); });
    put(g,bx(0.72,0.07,0.055,mChair),0,1.09,-0.29);
    put(g,bx(0.72,0.045,0.045,mChair),0,0.82,-0.29);
    [-0.20,0,0.20].forEach(function(x){ put(g,bx(0.065,0.27,0.04,mChair),x,0.96,-0.29); });
    var bow=bx(0.22,0.05,0.04,mm(0xffaad0,0.70)); bow.position.set(0,1.13,-0.26); g.add(bow);
    g.position.set(0,0,z); g.rotation.y=ry; return g;
  }
  scene.add(makeChair(-1.55,0));
  scene.add(makeChair(1.55,PI));

  // Candles
  var CG=new THREE.Group(); CG.position.set(0,0.95,0); TG.add(CG);
  put(CG,cy(0.13,0.12,0.032,20,mMetal),0,0,0);
  put(CG,cy(0.043,0.047,0.38,16,mWax),0,0.205,0);
  var flame=sp(0.028,8,mFlame); flame.scale.y=2.0; flame.position.y=0.43; CG.add(flame);
  var CG2=new THREE.Group(); CG2.position.set(0.35,0.95,0.30); TG.add(CG2);
  put(CG2,cy(0.08,0.075,0.02,16,mMetal),0,0,0);
  put(CG2,cy(0.028,0.030,0.22,12,mm(0xffc8e0,0.88)),0,0.12,0);
  var flame2=sp(0.018,6,mFlame); flame2.scale.y=1.8; flame2.position.y=0.245; CG2.add(flame2);

  // Plates
  function mkPlate(x,z){ put(TG,cy(0.215,0.205,0.022,28,mPlate),x,0.946,z); put(TG,cy(0.218,0.218,0.008,28,mGold),x,0.947,z); }
  mkPlate(-0.54,0.46); mkPlate(0.54,-0.46);

  // Cups
  function mkCup(x,z){
    var g=new THREE.Group(); g.position.set(x,0.962,z);
    put(g,cy(0.102,0.092,0.017,22,mPlate),0,0,0);
    put(g,cy(0.066,0.050,0.125,16,mCup),0,0.076,0);
    put(g,cy(0.056,0.056,0.007,16,mm(0xffa0c0,0.4)),0,0.132,0);
    var rim=new THREE.Mesh(new THREE.TorusGeometry(0.066,0.004,8,24),mGold); rim.position.y=0.141; g.add(rim);
    var h=new THREE.Mesh(new THREE.TorusGeometry(0.030,0.009,8,16),mCup); h.rotation.y=PI/2; h.position.set(0.087,0.076,0); g.add(h);
    TG.add(g);
  }
  mkCup(-0.76,0.64); mkCup(0.76,-0.64);

  // Milo Tin
  var MiG=new THREE.Group(); MiG.position.set(-0.29,0.962,-0.52); TG.add(MiG);
  put(MiG,cy(0.066,0.066,0.23,20,mMilo),0,0.115,0);
  put(MiG,cy(0.068,0.068,0.14,20,mMiloL),0,0.115,0);
  put(MiG,cy(0.069,0.069,0.030,20,mm(0xf0ece4,0.75)),0,0.114,0);
  put(MiG,cy(0.069,0.069,0.019,20,mMetal),0,0.237,0);

  // Milk Tin
  var MkG=new THREE.Group(); MkG.position.set(0.31,0.962,-0.50); TG.add(MkG);
  put(MkG,cy(0.059,0.059,0.20,20,mMilk),0,0.100,0);
  put(MkG,cy(0.061,0.061,0.095,20,mMilkL),0,0.100,0);
  put(MkG,cy(0.0615,0.0615,0.022,20,mBlue),0,0.118,0);
  put(MkG,cy(0.062,0.062,0.016,20,mMetal),0,0.208,0);

  // Roses
  function mkRose(x,z,rmat){
    var g=new THREE.Group(); g.position.set(x,0.956,z);
    put(g,cy(0.007,0.010,0.19,6,mStem),0,0.095,0);
    for(var i=0;i<5;i++){ var p=sp(0.052-i*0.006,7,rmat||mRose); p.scale.y=0.55; p.position.y=0.20+i*0.018; g.add(p); }
    TG.add(g);
  }
  mkRose(-0.56,0.54,mRose); mkRose(0.56,-0.54,mRose2); mkRose(0.00,0.45,mm(0xff70a0,0.72));

  // Table petals
  [[0.2,0.1],[-.3,0.3],[0.4,-.2],[-.2,-.3],[0.1,0.5]].forEach(function(p){
    var pet=bx(0.06,0.005,0.04,mPetal); pet.position.set(p[0],0.945,p[1]); pet.rotation.y=Math.random()*PI; TG.add(pet);
  });

  // Spoons & Napkins
  function mkSpoon(x,z,ry){ var s=cy(0.007,0.007,0.175,6,mMetal); s.position.set(x,0.953,z); s.rotation.y=ry; TG.add(s); }
  mkSpoon(-0.92,0.64,0.3); mkSpoon(0.92,-0.64,-0.3);
  function mkNapkin(x,z,ry){ var n=bx(0.16,0.01,0.18,mNapkin); n.position.set(x,0.943,z); n.rotation.y=ry; TG.add(n); }
  mkNapkin(-0.80,0.42,0.18); mkNapkin(0.80,-0.42,-0.18);

  // Balloons
  function mkBalloon(x,y,z,bmat,sz){
    sz=sz||1; var ball=sp(0.22*sz,10,bmat); ball.position.set(x,y,z); scene.add(ball);
    var spts=[new THREE.Vector3(x,y-0.22*sz,z),new THREE.Vector3(x+(Math.random()-.5)*0.1,y-0.8*sz,z)];
    scene.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(spts),8,0.005,4,false),mString));
  }
  mkBalloon(-3.2,3.8,-2.5,mBalloon,1.0); mkBalloon(-3.5,3.2,-2.3,mBalloon2,0.85); mkBalloon(-2.9,3.5,-2.6,mBalloon3,0.9);
  mkBalloon(3.2,3.8,-2.5,mBalloon2,1.0); mkBalloon(3.5,3.2,-2.3,mBalloon3,0.85); mkBalloon(2.9,3.5,-2.6,mBalloon,0.9);
  mkBalloon(-0.6,5.4,4.6,mBalloon,0.8); mkBalloon(0,5.6,4.6,mBalloon2,0.9); mkBalloon(0.6,5.4,4.6,mBalloon3,0.8);

  // Floor petals path
  [[0.2,3.0],[-.4,3.2],[0.5,5.0],[-.2,5.5],[0.3,6.5],[-.5,7.0],[0.1,7.8]].forEach(function(p){
    var pet=bx(0.14,0.008,0.09,mPetal); pet.position.set(p[0],0,p[1]); pet.rotation.y=Math.random()*PI; scene.add(pet);
  });

  // Lighting
  scene.add(new THREE.AmbientLight(0x3a0a28,1.8));
  var candlePt=new THREE.PointLight(0xff60a0,1.4,2.2);
  candlePt.position.set(0,1.55,0); candlePt.castShadow=true; candlePt.shadow.mapSize.set(512,512); scene.add(candlePt);
  var candlePt2=new THREE.PointLight(0xff80b0,0.7,1.4);
  candlePt2.position.set(0.35,1.3,0.30); scene.add(candlePt2);
  var fairyPt=new THREE.PointLight(0xff44aa,0.8,14);
  fairyPt.position.set(0,3.8,-5.5); scene.add(fairyPt);
  var archPt=new THREE.PointLight(0xff70c0,0.9,10);
  archPt.position.set(0,3.5,4.8); scene.add(archPt);
  var stepFill=new THREE.DirectionalLight(0xffb0d8,0.12);
  stepFill.position.set(0,6,6); scene.add(stepFill);
  var leftFill=new THREE.PointLight(0xff40a0,0.6,10);
  leftFill.position.set(-5,3,0); scene.add(leftFill);
  var rightFill=new THREE.PointLight(0xff40a0,0.6,10);
  rightFill.position.set(5,3,0); scene.add(rightFill);

  // Drag controls
  var drag=false,lx=0,ly=0;
  renderer.domElement.addEventListener('mousedown',function(e){ drag=true; lx=e.clientX; ly=e.clientY; document.body.classList.add('drag'); });
  window.addEventListener('mousemove',function(e){ if(!drag)return; oTheta-=(e.clientX-lx)*0.45; oPhi=Math.max(10,Math.min(80,oPhi+(e.clientY-ly)*0.35)); lx=e.clientX; ly=e.clientY; camUpdate(); });
  window.addEventListener('mouseup',function(){ drag=false; document.body.classList.remove('drag'); });
  renderer.domElement.addEventListener('wheel',function(e){ e.preventDefault(); oR=Math.max(2.5,Math.min(14,oR+e.deltaY*0.008)); camUpdate(); },{passive:false});
  var lTX=0,lTY=0,lPin=0;
  renderer.domElement.addEventListener('touchstart',function(e){ e.preventDefault(); if(e.touches.length===1){lTX=e.touches[0].clientX;lTY=e.touches[0].clientY;} if(e.touches.length===2) lPin=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); },{passive:false});
  renderer.domElement.addEventListener('touchmove',function(e){ e.preventDefault(); if(e.touches.length===1){ oTheta-=(e.touches[0].clientX-lTX)*0.45; oPhi=Math.max(10,Math.min(80,oPhi+(e.touches[0].clientY-lTY)*0.35)); lTX=e.touches[0].clientX;lTY=e.touches[0].clientY; camUpdate(); } if(e.touches.length===2){ var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); oR=Math.max(2.5,Math.min(14,oR-(d-lPin)*0.015)); lPin=d; camUpdate(); } },{passive:false});

  // Animate
  var clock=new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    var t=clock.getElapsedTime();
    candlePt.intensity  = 1.3+Math.sin(t*7.2)*0.18+Math.sin(t*13.5)*0.08;
    candlePt2.intensity = 0.6+Math.sin(t*9.1)*0.12+Math.sin(t*17.3)*0.05;
    flame.scale.y  = 1.85+Math.sin(t*8.3)*0.28;
    flame.position.x = Math.sin(t*6.1)*0.005;
    flame2.scale.y = 1.65+Math.sin(t*9.2)*0.22;
    fairyPt.intensity = 0.75+Math.sin(t*2.5)*0.12;
    renderer.render(scene,camera);
  }
  animate();

  window.addEventListener('resize',function(){
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });

});
</script>
</body>
</html>
